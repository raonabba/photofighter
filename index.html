<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE KING OF IT 2026 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        
        :root { --bg: #020617; }
        body { 
            font-family: 'Jua', sans-serif; background: var(--bg); color: white; 
            margin: 0; padding: 0; overflow: hidden; height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 메인 컨테이너: 화면을 벗어나지 않게 제약 */
        .game-wrapper {
            width: 100%; height: 100%;
            max-width: 1200px; max-height: 100dvh;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            box-sizing: border-box;
        }

        /* 상단 타이틀 */
        .header { flex: 0 0 auto; padding: 10px 0; text-align: center; }

        /* 아레나 박스: 16:9 비율 강제 유지 및 잘림 방지 */
        .arena-container {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .arena-inner {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: 100%; /* 부모 높이를 넘지 않게 */
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        canvas {
            width: 100%; height: 100%;
            display: block; border-radius: 10px;
        }

        /* 체력바 및 타이머 */
        .ui-overlay {
            position: absolute; top: 5%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 10px; padding: 0 5%; pointer-events: none;
        }
        .hp-bar { flex: 1; height: clamp(10px, 3vh, 25px); background: #450a0a; border: 2px solid #fff; transform: skew(-15deg); overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #facc15, #ef4444); transition: width 0.3s; }
        .timer-val { width: clamp(40px, 8vh, 60px); height: clamp(40px, 8vh, 60px); background: #000; border: 2px solid #facc15; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #facc15; font-size: 1.2rem; font-family: 'Black Han Sans'; }

        /* 컨트롤 패널 */
        .controls { flex: 0 0 auto; padding: 15px 0; display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
        .btn-sm { background: #334155; border-bottom: 3px solid #1e293b; padding: 8px 5px; border-radius: 8px; font-size: 0.7rem; width: 100%; }
        .fight-btn { background: #ef4444; padding: 12px 30px; border-radius: 12px; font-family: 'Black Han Sans'; font-size: clamp(1.2rem, 4vw, 1.8rem); box-shadow: 0 5px 0 #991b1b; }
        .fight-btn.disabled { opacity: 0.3; transform: translateY(5px); box-shadow: none; }

        /* 모달 (크롭) */
        #cropModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #cropCanvas { max-width: 80%; max-height: 40vh; border-radius: 50%; border: 2px solid #facc15; touch-action: none; }
    </style>
</head>
<body>

    <div id="cropModal">
        <canvas id="cropCanvas" width="300" height="300"></canvas>
        <input type="range" id="zoomRange" min="0.1" max="3" step="0.05" value="1" class="w-64 my-8">
        <div class="flex gap-4">
            <button onclick="saveCrop()" class="bg-green-600 px-12 py-3 rounded-xl font-bold">완료</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="header">
            <h1 class="text-xl md:text-3xl font-black text-yellow-400 italic">THE KING OF IT</h1>
            <p class="text-[10px] text-sky-400 tracking-widest">COMPLIANCE ULTIMATE MATCH 2026</p>
        </div>

        <div class="arena-container">
            <div class="arena-inner">
                <div class="ui-overlay">
                    <div class="hp-bar"><div id="hp1" class="hp-fill" style="width:100%"></div></div>
                    <div class="timer-val">99</div>
                    <div class="hp-bar"><div id="hp2" class="hp-fill" style="width:100%"></div></div>
                </div>
                <canvas id="gameCanvas"></canvas>
            </div>
        </div>

        <div class="controls">
            <div class="flex flex-col gap-1">
                <span id="n1" class="text-[9px] text-sky-400 font-bold truncate">PLAYER 1</span>
                <button onclick="openUpload('p1')" class="btn-sm">UPLOAD</button>
            </div>
            <button id="fightBtn" onclick="startBattle()" class="fight-btn disabled">FIGHT!</button>
            <div class="flex flex-col gap-1 text-right">
                <span id="n2" class="text-[9px] text-rose-500 font-bold truncate">PLAYER 2</span>
                <button onclick="openUpload('p2')" class="btn-sm">UPLOAD</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*">

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        // 내부 논리 좌표계 고정
        const V_WIDTH = 1200;
        const V_HEIGHT = 675;
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;

        const phrases = ["운영DB 조건절 없이 삭제!", "퇴근 5분전 회의소집!", "법카한도 초과!", "맥북에 커피 쏟음!", "인수인계 문서 0바이트!", "주말 장애 대응!", "슬랙 닉네임 실수!", "배포 직후 화이트스크린!"];
        const nicks = ["문서반려동물", "갑질왕", "애는착해요", "법카수호자", "야근요정", "보고서살인마"];

        let p1 = { x: 250, y: 350, hp: 100, face: null, nick: "P1", targetX: 250 };
        let p2 = { x: 950, y: 350, hp: 100, face: null, nick: "P2", targetX: 950 };
        let activeP = null, isFighting = false, shake = 0, msg = { text: "", life: 0 };

        // 크롭 관련
        const cCanvas = document.getElementById('cropCanvas');
        const cctx = cCanvas.getContext('2d');
        let rawImg = null, cropPos = { x: 150, y: 150 }, isDragging = false, lastX, lastY;

        function openUpload(p) { activeP = (p === 'p1' ? p1 : p2); document.getElementById('fileInput').click(); }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                rawImg = new Image();
                rawImg.onload = () => { document.getElementById('cropModal').style.display = 'flex'; drawCrop(); };
                rawImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function drawCrop() {
            cctx.clearRect(0, 0, 300, 300);
            const z = document.getElementById('zoomRange').value;
            cctx.drawImage(rawImg, cropPos.x - (rawImg.width*z)/2, cropPos.y - (rawImg.height*z)/2, rawImg.width*z, rawImg.height*z);
            cctx.strokeStyle = '#facc15'; cctx.lineWidth = 3; cctx.beginPath(); cctx.arc(150, 150, 148, 0, Math.PI*2); cctx.stroke();
        }

        const handleStart = (e) => { isDragging = true; const t = e.touches ? e.touches[0] : e; lastX = t.clientX; lastY = t.clientY; };
        const handleMove = (e) => {
            if(!isDragging) return;
            const t = e.touches ? e.touches[0] : e;
            cropPos.x += (t.clientX - lastX); cropPos.y += (t.clientY - lastY);
            lastX = t.clientX; lastY = t.clientY; drawCrop();
        };
        cCanvas.addEventListener('mousedown', handleStart); cCanvas.addEventListener('touchstart', handleStart);
        window.addEventListener('mousemove', handleMove); window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', () => isDragging = false); window.addEventListener('touchend', () => isDragging = false);

        function saveCrop() {
            const temp = document.createElement('canvas'); temp.width = 200; temp.height = 200;
            const tCtx = temp.getContext('2d');
            tCtx.beginPath(); tCtx.arc(100, 100, 100, 0, Math.PI*2); tCtx.clip();
            tCtx.drawImage(cCanvas, 50, 50, 200, 200, 0, 0, 200, 200);
            activeP.face = new Image(); activeP.face.src = temp.toDataURL();
            activeP.nick = nicks[Math.floor(Math.random()*nicks.length)];
            document.getElementById(activeP === p1 ? 'n1' : 'n2').innerText = activeP.nick;
            document.getElementById('cropModal').style.display = 'none';
            if(p1.face && p2.face) document.getElementById('fightBtn').classList.remove('disabled');
        }

        function drawChar(p, isP1) {
            const idle = Math.sin(Date.now() / 200) * 10;
            p.x += (p.targetX - p.x) * 0.2;
            ctx.save();
            ctx.translate(p.x, p.y + idle);
            if(!isP1) ctx.scale(-1, 1);

            // 몸체
            ctx.fillStyle = isP1 ? "#0ea5e9" : "#f43f5e";
            ctx.fillRect(-30, 20, 60, 80); // 몸
            ctx.fillRect(-25, 100, 20, 40); ctx.fillRect(5, 100, 20, 40); // 다리

            // 얼굴
            if(p.face) {
                ctx.save(); ctx.beginPath(); ctx.arc(0, -60, 70, 0, Math.PI*2); ctx.clip();
                ctx.drawImage(p.face, -70, -130, 140, 140); ctx.restore();
            } else {
                ctx.fillStyle = "#334155"; ctx.beginPath(); ctx.arc(0, -60, 70, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        async function startBattle() {
            if(isFighting) return; isFighting = true;
            document.getElementById('fightBtn').classList.add('disabled');
            while(p1.hp > 0 && p2.hp > 0) {
                await doAtk(p1, p2, true); if(p2.hp <= 0) break;
                await new Promise(r => setTimeout(r, 600));
                await doAtk(p2, p1, false);
                await new Promise(r => setTimeout(r, 600));
            }
            alert(`K.O! 승리: ${p1.hp>0?p1.nick:p2.nick}\n보상: 연차 결재 자동 승인권!`);
            location.reload();
        }

        async function doAtk(a, d, isP1) {
            msg = { text: phrases[Math.floor(Math.random()*phrases.length)], life: 80 };
            a.targetX = isP1 ? 150 : 1050; await new Promise(r => setTimeout(r, 200));
            a.targetX = isP1 ? d.x - 80 : d.x + 80; shake = 15;
            d.hp = Math.max(0, d.hp - (15 + Math.random()*15));
            document.getElementById(isP1 ? 'hp2' : 'hp1').style.width = (isP1 ? p2.hp : p1.hp) + "%";
            await new Promise(r => setTimeout(r, 400));
            a.targetX = isP1 ? 250 : 950;
        }

        function loop() {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);
            if(shake > 0) { ctx.save(); ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
            
            // 바닥
            ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 500, V_WIDTH, 175);
            
            drawChar(p1, true); drawChar(p2, false);

            if(msg.life > 0) {
                ctx.fillStyle = "#facc15"; ctx.font = "bold 45px Jua"; ctx.textAlign = "center";
                ctx.shadowBlur = 10; ctx.shadowColor = "black";
                ctx.fillText(msg.text, 600, 220); msg.life--;
            }
            if(shake > 0) ctx.restore();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
