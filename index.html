<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-IT GOVERNANCE FIGHTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background: #020617; color: white; overflow: hidden; touch-action: manipulation; }
        .arena-wrapper { 
            position: relative; width: 95%; max-width: 900px; aspect-ratio: 16 / 9; margin: 20px auto; 
            border: 5px solid #1e293b; border-radius: 10px; overflow: hidden;
            background: linear-gradient(to bottom, #0f172a 0%, #1e293b 70%, #334155 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(56,189,248,0.1);
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .hp-container { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; px: 40px; }
        .hp-outer { width: 40%; height: 25px; background: #450a0a; border: 3px solid #f8fafc; transform: skew(-15deg); overflow: hidden; }
        .hp-inner { height: 100%; background: linear-gradient(90deg, #facc15, #ef4444); transition: width 0.3s ease-out; }
        .player-label { position: absolute; top: 50px; font-family: 'Black Han Sans'; font-size: 1.5rem; text-shadow: 2px 2px #000; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="mt-4 text-center">
        <h1 class="text-4xl font-bold text-yellow-400 italic tracking-tighter">THE KING OF IT-COMPLIANCE '26</h1>
    </div>

    <div class="arena-wrapper" id="arena">
        <div class="hp-container px-10">
            <div class="hp-outer"><div id="hp-p1" class="hp-inner" style="width: 100%"></div></div>
            <div class="hp-outer"><div id="hp-p2" class="hp-inner" style="width: 100%"></div></div>
        </div>
        <div id="p1-tag" class="player-label left-16 text-sky-400">P1</div>
        <div id="p2-tag" class="player-label right-16 text-rose-500">P2</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="w-full max-w-2xl grid grid-cols-2 gap-4 p-4 bg-slate-900 rounded-xl border-t-4 border-yellow-500">
        <div class="flex flex-col gap-2">
            <input id="name1" type="text" value="구매자산팀" class="bg-slate-800 p-2 rounded border border-sky-500 text-center">
            <button onclick="document.getElementById('file1').click()" class="bg-sky-700 text-xs py-1 rounded">얼굴 합성</button>
            <input type="file" id="file1" hidden onchange="loadImg(event, 'p1')">
        </div>
        <div class="flex flex-col gap-2">
            <input id="name2" type="text" value="거버넌스팀" class="bg-slate-800 p-2 rounded border border-rose-500 text-center">
            <button onclick="document.getElementById('file2').click()" class="bg-rose-700 text-xs py-1 rounded">얼굴 합성</button>
            <input type="file" id="file2" hidden onchange="loadImg(event, 'p2')">
        </div>
        <button onclick="startBattle()" class="col-span-2 bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-lg text-xl transform active:scale-95 transition">ROUND 1... FIGHT!</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 675;

        // --- 유머러스 IT 빌런 공격 멘트 ---
        const attackPhrases = [
            "자산 실사인데 맥북 100대 행방불명!!", "망분리 PC에서 유튜브 프리미엄 접속 적발!", "외주업체 인력이 소스코드 깃허브에 업로드!!", "구매 품의서 단가 오타로 100배 결제!",
            "IT 거버넌스 무시하고 클라우드 임의 생성!", "감사 전날 로그 데이터 전체 삭제!", "보안성 심의 없이 운영 서버 다이렉트 배포!", "법인카드로 비트코인 채굴기 구매 적발!",
            "유지보수 업체 사장님이 연락 두절!!", "내부 회계 감사 지적 사항 150건 발생!", "전산실 에어컨 끄고 퇴근하기!", "중요 데이터 DB에 '1234'로 암호화!",
            "망혼용 케이블 무단 연결(Loop 발생)!!", "라이선스 오남용으로 오라클 형님들 방문!", "보고서 폰트가 굴림체라고 반려!", "금요일 17시 59분에 서버 재부팅!",
            "부장님 PC에 랜섬웨어 감염시키기!", "출입증 없이 데이터 센터 무단 침입!", "계약서에 업체 직인 대신 내 도장 찍기!", "IT 기획안에 'AI' 단어 안 넣었다고 퇴짜!"
        ];

        const humiliationPhrases = [
            "기술적 부채나 갚으러 가시죠.", "당신의 커리어는 오늘부로 'Hard Delete' 되었습니다.", "시말서 양식은 메일로 보냈습니다. 궁서체로 쓰세요.", "거버넌스가 우스워 보이십니까?", "자산 번호 9999번(폐기)으로 등록해 드릴게요."
        ];

        let p1 = { x: 200, y: 400, hp: 100, face: null, state: 'idle', frame: 0 };
        let p2 = { x: 800, y: 400, hp: 100, face: null, state: 'idle', frame: 0 };
        let effects = [];
        let particles = [];
        let shake = 0;
        let isFighting = false;

        function loadImg(e, p) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { if(p === 'p1') p1.face = img; else p2.face = img; };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        // --- 이펙트 시스템 (문서 파편 등) ---
        class Effect {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.life = 20;
                this.text = type === 'doc' ? ["PDF", "Excel", "결재", "반려"][Math.floor(Math.random()*4)] : "";
            }
            draw() {
                ctx.save();
                if(this.type === 'hit') {
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(this.x, this.y, 40 * (this.life/20), 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = "#cbd5e1";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText(this.text, this.x, this.y - (20 - this.life) * 5);
                }
                ctx.restore();
                this.life--;
            }
        }

        function spawnHit(x, y) {
            shake = 15;
            effects.push(new Effect(x, y, 'hit'));
            for(let i=0; i<5; i++) effects.push(new Effect(x + Math.random()*100-50, y + Math.random()*100-50, 'doc'));
        }

        function drawChar(char, isP1) {
            const flip = isP1 ? 1 : -1;
            const bob = Math.sin(Date.now() / 200) * 10; // Idle 애니메이션
            
            ctx.save();
            ctx.translate(char.x + 100, char.y + 100);
            if(!isP1) ctx.scale(-1, 1);

            // 몸체 (KOF 도복 스타일)
            ctx.fillStyle = isP1 ? "#0ea5e9" : "#e11d48";
            ctx.beginPath();
            ctx.moveTo(-50, 150); ctx.lineTo(50, 150); 
            ctx.lineTo(40, 0); ctx.lineTo(-40, 0); ctx.fill();

            // 얼굴 원형
            ctx.save();
            ctx.beginPath(); ctx.arc(0, bob - 50, 60, 0, Math.PI*2); ctx.clip();
            if(char.face) ctx.drawImage(char.face, -60, bob - 110, 120, 120);
            else { ctx.fillStyle = "#f1f5f9"; ctx.fill(); }
            ctx.restore();

            // 테두리
            ctx.strokeStyle = "white"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(0, bob - 50, 62, 0, Math.PI*2); ctx.stroke();
            
            ctx.restore();
        }

        async function attack(atk, def, isP1) {
            const startX = atk.x;
            const targetX = isP1 ? def.x - 150 : def.x + 150;
            const msg = attackPhrases[Math.floor(Math.random()*attackPhrases.length)];

            // 멘트 표시
            battleMsg = { text: msg, x: atk.x + 100, y: atk.y - 100, life: 60 };

            // 1. 기 모으기 (KOF 느낌)
            atk.x -= 30 * (isP1 ? 1 : -1);
            await new Promise(r => setTimeout(r, 200));

            // 2. 파파팍! 돌진 공격
            for(let i=0; i<5; i++) {
                atk.x += (targetX - atk.x) * 0.5;
                await new Promise(r => setTimeout(r, 30));
            }

            // 3. 타격 임팩트
            def.hp -= Math.floor(Math.random()*15) + 10;
            document.getElementById(`hp-${isP1?'p2':'p1'}`).style.width = Math.max(0, (isP1?p2.hp:p1.hp)) + "%";
            spawnHit(def.x + 100, def.y + 50);
            
            await new Promise(r => setTimeout(r, 1000)); // 멘트 읽는 시간

            // 4. 복귀
            atk.x = startX;
        }

        let battleMsg = { text: "", x: 0, y: 0, life: 0 };

        async function startBattle() {
            if(isFighting) return;
            isFighting = true;
            p1.hp = 100; p2.hp = 100;
            p1.x = 200; p2.x = 800;
            syncUI();

            while(p1.hp > 0 && p2.hp > 0) {
                await attack(p1, p2, true);
                if(p2.hp <= 0) break;
                await new Promise(r => setTimeout(r, 500));
                await attack(p2, p1, false);
                await new Promise(r => setTimeout(r, 500));
            }

            const winner = p1.hp > 0 ? document.getElementById('name1').value : document.getElementById('name2').value;
            const insult = humiliationPhrases[Math.floor(Math.random()*humiliationPhrases.length)];
            alert(`WINNER: ${winner}\n\n"${insult}"`);
            isFighting = false;
        }

        function syncUI() {
            document.getElementById('hp-p1').style.width = p1.hp + "%";
            document.getElementById('hp-p2').style.width = p2.hp + "%";
            document.getElementById('p1-tag').innerText = document.getElementById('name1').value;
            document.getElementById('p2-tag').innerText = document.getElementById('name2').value;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 화면 흔들림
            if(shake > 0) {
                ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
                shake *= 0.9;
            }

            // 배경 바닥
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(0, 550, canvas.width, 125);

            drawChar(p1, true);
            drawChar(p2, false);

            // 이펙트 처리
            effects = effects.filter(e => e.life > 0);
            effects.forEach(e => e.draw());

            // 멘트 처리
            if(battleMsg.life > 0) {
                ctx.fillStyle = "yellow";
                ctx.font = "italic bold 35px Jua";
                ctx.textAlign = "center";
                ctx.strokeStyle = "black"; ctx.lineWidth = 6;
                ctx.strokeText(battleMsg.text, battleMsg.x, battleMsg.y);
                ctx.fillText(battleMsg.text, battleMsg.x, battleMsg.y);
                battleMsg.life--;
            }

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            requestAnimationFrame(gameLoop);
        }

        syncUI();
        gameLoop();
    </script>
</body>
</html>
