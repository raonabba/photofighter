<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포토 파이터 - 금융 실무 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background: #0f172a;
            color: white;
            touch-action: manipulation;
            margin: 0;
            padding: 10px;
        }

        /* 반응형 아레나 컨테이너 */
        .arena-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            margin: 0 auto;
            border: 4px solid #38bdf8;
            border-radius: 15px;
            overflow: hidden;
            background: #1e293b;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .input-group input {
            background: rgba(255,255,255,0.1);
            border: 2px solid #38bdf8;
            color: white;
            border-radius: 8px;
            padding: 5px 10px;
            width: 100%;
            text-align: center;
        }

        .hp-bar-bg {
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
        }

        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="w-full max-w-2xl mb-4 text-center">
        <h1 class="text-3xl font-bold text-sky-400 mb-4">🏦 금융 실무 파이터</h1>
        
        <div class="grid grid-cols-2 gap-4 input-group">
            <div>
                <label class="text-xs text-sky-300">내 이름</label>
                <input id="p-name" type="text" value="나대리" oninput="syncNames()">
            </div>
            <div>
                <label class="text-xs text-pink-400">상대 이름</label>
                <input id="o-name" type="text" value="김부장" oninput="syncNames()">
            </div>
        </div>
    </div>

    <div class="arena-wrapper" id="arena-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="w-full max-w-2xl mt-4 grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-800 p-4 rounded-xl">
        <div class="space-y-2">
            <div class="flex justify-between text-sm"><span id="lbl-p-name">나대리</span><span>HP</span></div>
            <div class="hp-bar-bg"><div id="hp-p-fill" class="hp-bar-fill" style="width: 100%"></div></div>
        </div>
        
        <div class="flex flex-col gap-2">
            <button onclick="startBattle()" id="btn-start" class="bg-sky-500 hover:bg-sky-400 py-3 rounded-lg font-bold text-lg shadow-lg active:scale-95 transition">⚔️ 업무 시작!</button>
            <div class="flex gap-2">
                <button onclick="document.getElementById('up-p').click()" class="flex-1 bg-slate-700 text-xs py-2 rounded border border-slate-500">내 사진</button>
                <button onclick="document.getElementById('up-o').click()" class="flex-1 bg-slate-700 text-xs py-2 rounded border border-slate-500">상대 사진</button>
            </div>
            <input type="file" id="up-p" hidden accept="image/*" onchange="loadFile(event, 'player')">
            <input type="file" id="up-o" hidden accept="image/*" onchange="loadFile(event, 'opp')">
        </div>

        <div class="space-y-2">
            <div class="flex justify-between text-sm"><span id="lbl-o-name">김부장</span><span>HP</span></div>
            <div class="hp-bar-bg"><div id="hp-o-fill" class="hp-bar-fill" style="width: 100%"></div></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 50종의 금융권 실무 멘트
        const phrases = [
            "발주 1000개 리스트 정리!", "필살기 BCP 가동!!", "계약현황관리 눈알 붙이기!!", "분실자산 1000개 발견!!",
            "금감원 수검 대응 개시!", "IT 예산 편성 삭감 빔!!", "구매 품의 무한 반려!", "컴플라이언스 위반 탐지!",
            "자산 실사 지옥의 레이스!", "보안성 심의 미승인!", "망분리 우회 차단!!", "데이터 센터 긴급 점검!",
            "정보보호 상시평가 제출!", "계약서 법무 검토 지옥!", "입찰 공고 재게시!!", "내부회계관리제도 감사!",
            "전산 장애 긴급 복구!", "소프트웨어 라이선스 실사!", "비용 집행 증빙 누락!", "법인카드 사적 사용 적발!",
            "서버실 온습도 이상 무!!", "정기 보안 패치 강제 실행!", "외주 인력 출입 통제!", "정보 유출 탐지 시스템 작동!",
            "로그 분석 결과 보고!!", "금리 변동 시뮬레이션!", "여신 승인 프로세스 중단!", "전자금융사고 보고서 작성!",
            "개인정보 영향평가 실시!", "클라우드 전환 계획 전면 재검토!", "방화벽 정책 1만건 정리!", "VPN 접속 차단 공격!",
            "사용자 권한 오남용 발견!", "차세대 시스템 오픈 연기!", "코드 리뷰 무한 루프!", "데이터 마이그레이션 오류!",
            "백업 테이프 소거 완료!", "감사 지적 사항 이행 보고!", "연간 운영계획 수립!", "예산 전용 승인 요청!",
            "하드웨어 내용연수 만료!", "자산 폐기 신청서 승인!", "기술 지원 계약 연장!", "긴급 장애 전파 SMS!",
            "메인프레임 시스템 점검!", "망 연계 솔루션 오류 복구!", "내부망 PC 포맷 실행!", "단말기 보안 에이전트 강제 설치!",
            "재해복구센터 전환 훈련!", "최종 승인권자 부재중!!"
        ];

        let player = { x: 100, hp: 100, img: new Image(), name: "나대리" };
        let opp = { x: 500, hp: 100, img: new Image(), name: "김부장" };
        player.img.src = "https://picsum.photos/id/64/300/300";
        opp.img.src = "https://picsum.photos/id/91/300/300";

        let battleText = { content: "", opacity: 0, x: 0, y: 0 };
        let isRunning = false;

        function resize() {
            canvas.width = 800;
            canvas.height = 450;
        }
        window.addEventListener('resize', resize);
        resize();

        function syncNames() {
            player.name = document.getElementById('p-name').value;
            opp.name = document.getElementById('o-name').value;
            document.getElementById('lbl-p-name').innerText = player.name;
            document.getElementById('lbl-o-name').innerText = opp.name;
        }

        function loadFile(event, type) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                if(type === 'player') player.img.src = e.target.result;
                else opp.img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function startBattle() {
            if (isRunning) return;
            isRunning = true;
            player.hp = 100; opp.hp = 100;
            updateUI();

            while (player.hp > 0 && opp.hp > 0) {
                await attack(player, opp, true);
                if (opp.hp <= 0) break;
                await new Promise(r => setTimeout(r, 600));
                await attack(opp, player, false);
                await new Promise(r => setTimeout(r, 600));
            }
            
            alert(player.hp > 0 ? `${player.name} 승리! (업무 완수)` : `${opp.name} 승리! (시말서 확정)`);
            isRunning = false;
        }

        async function attack(attacker, target, isPlayer) {
            battleText.content = phrases[Math.floor(Math.random() * phrases.length)];
            battleText.x = attacker.x;
            battleText.y = 150;
            battleText.opacity = 1;

            // 돌진 애니메이션
            const originalX = attacker.x;
            const targetX = isPlayer ? target.x - 80 : target.x + 80;
            
            for(let i=0; i<10; i++) {
                attacker.x += (targetX - attacker.x) * 0.3;
                await new Promise(r => setTimeout(r, 20));
            }

            target.hp -= Math.floor(Math.random() * 20) + 10;
            if(target.hp < 0) target.hp = 0;
            updateUI();

            // 후퇴
            for(let i=0; i<10; i++) {
                attacker.x += (originalX - attacker.x) * 0.3;
                battleText.opacity -= 0.1;
                await new Promise(r => setTimeout(r, 20));
            }
            attacker.x = originalX;
            battleText.opacity = 0;
        }

        function updateUI() {
            document.getElementById('hp-p-fill').style.width = player.hp + "%";
            document.getElementById('hp-o-fill').style.width = opp.hp + "%";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 배경 격자
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }

            // 캐릭터 그리기
            ctx.save();
            // 플레이어
            ctx.shadowBlur = 15; ctx.shadowColor = "#38bdf8";
            ctx.drawImage(player.img, player.x, 200, 150, 150);
            // 상대 (반전)
            ctx.shadowColor = "#f43f5e";
            ctx.translate(opp.x + 150, 200);
            ctx.scale(-1, 1);
            ctx.drawImage(opp.img, 0, 0, 150, 150);
            ctx.restore();

            // 말풍선 멘트
            if (battleText.opacity > 0) {
                ctx.fillStyle = `rgba(255, 255, 0, ${battleText.opacity})`;
                ctx.font = "bold 24px Jua";
                ctx.textAlign = "center";
                ctx.strokeStyle = "black";
                ctx.lineWidth = 4;
                ctx.strokeText(battleText.content, battleText.x + 75, battleText.y);
                ctx.fillText(battleText.content, battleText.x + 75, battleText.y);
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
