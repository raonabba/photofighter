<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE KING OF IT-COMPLIANCE '26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background: #0f172a; color: white; overflow: hidden; touch-action: manipulation; }
        .game-ui { position: relative; width: 100%; max-width: 1000px; margin: 0 auto; }
        .arena { position: relative; width: 100%; aspect-ratio: 16/9; background: #1e293b; border: 8px solid #334155; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; }
        .hp-bar-container { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 50; padding: 0 40px; }
        .hp-bg { width: 40%; height: 35px; background: #450a0a; border: 3px solid #fff; transform: skew(-20deg); overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #facc15, #ef4444); transition: width 0.3s ease; }
        .timer-circle { width: 70px; height: 70px; background: #000; border: 4px solid #facc15; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #facc15; font-size: 2rem; font-family: 'Black Han Sans'; }
        
        /* 모달 스타일 */
        #cropModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        #cropCanvas { border: 2px solid #facc15; border-radius: 50%; cursor: move; }
        
        .btn-action { background: linear-gradient(180deg, #334155 0%, #0f172a 100%); border: 2px solid #475569; border-radius: 10px; font-size: 0.8rem; padding: 10px; transition: all 0.2s; }
        .btn-action:hover { border-color: #facc15; color: #facc15; }
        .fight-btn { background: #ef4444; color: white; font-family: 'Black Han Sans'; font-size: 2rem; padding: 10px 60px; border-radius: 15px; box-shadow: 0 10px 0 #991b1b; transform: translateY(-5px); }
        .fight-btn:active { transform: translateY(0); box-shadow: 0 0 0; }
        .ready { animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #facc15; } to { box-shadow: 0 0 25px #facc15; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="cropModal">
        <h2 class="text-xl mb-4">얼굴 위치를 맞춰주세요 (드래그/확대)</h2>
        <canvas id="cropCanvas" width="300" height="300"></canvas>
        <input type="range" id="zoomRange" min="0.1" max="3" step="0.1" value="1" class="w-64 my-4">
        <button onclick="saveCrop()" class="bg-green-600 px-10 py-3 rounded-xl font-bold text-xl">완료!</button>
    </div>

    <div class="game-ui">
        <div class="text-center mb-4">
            <h1 class="text-4xl font-black text-yellow-400 italic">THE KING OF IT</h1>
            <p class="text-sky-400 text-sm tracking-widest">COMPLIANCE ULTIMATE MATCH 2026</p>
        </div>

        <div class="arena">
            <div class="hp-bar-container">
                <div class="hp-bg"><div id="hp1" class="hp-fill" style="width:100%"></div></div>
                <div class="timer-circle" id="timer">99</div>
                <div class="hp-bg"><div id="hp2" class="hp-fill" style="width:100%"></div></div>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-6 items-center">
            <div class="flex flex-col gap-2">
                <div id="nick1" class="text-sky-400 font-bold text-center">PLAYER 1</div>
                <button onclick="openUpload('p1')" class="btn-action">UPLOAD FACE</button>
                <button id="rec1" onclick="recordVoice('p1')" class="btn-action">VOICE REC</button>
            </div>
            
            <div class="flex justify-center">
                <button id="fightBtn" onclick="startBattle()" class="fight-btn opacity-50 pointer-events-none">FIGHT!</button>
            </div>

            <div class="flex flex-col gap-2 text-right">
                <div id="nick2" class="text-rose-500 font-bold text-center">PLAYER 2</div>
                <button onclick="openUpload('p2')" class="btn-action">UPLOAD FACE</button>
                <button id="rec2" onclick="recordVoice('p2')" class="btn-action">VOICE REC</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*">

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 675;

        // 100가지 IT 직장인 발작 멘트
        const attackPhrases = [
            "법카한도 초과 보라짱한테 연락받기", "망분리 PC로 유튜브 보다 걸림", "전사 공지: 이번 추석 선물은 양말 세트",
            "개발 서버에 실데이터 넣고 삭제", "깃허브 푸시했는데 API 키 포함됨", "점심시간 10분 전에 회의 소집",
            "퇴근 직전 '잠깐 대화 좀 할까요?'", "내 연차 날짜에 전사 워크숍", "코드 리뷰: '그냥 다 고치세요'",
            "부장님 엑셀 줄 맞추기 심부름", "운영 DB에서 WHERE 절 없이 DELETE", "배포 5분 전 치명적 버그 발견",
            "슬랙/카톡 닉네임 '안읽음'으로 변경", "맥북에 커피 쏟기", "비밀번호 변경 강제 주기 도래",
            "화장실 갔는데 휴지 없음", "내 모니터 뒤에 팀장님 자리 배치", "외주 업체 갑자기 연락 두절",
            "품의서 폰트 9포인트라고 반려", "회식 메뉴 삼겹살로 통일", "전직원 주말 보안 점검 출근",
            "협력사 미팅인데 혼자 나감", "신규 입사자 컴퓨터 펜티엄급 지급", "회의록 작성 짬처리 당하기",
            "옆자리 동료 키보드 청축 소음", "에어컨 중앙 제어로 꺼짐", "법카로 긁은 식당 영수증 분실",
            "상무님 건배사 30분 달성", "로그 확인해보니 내 실수임", "노트북 배터리 없는데 충전기 두고 옴",
            "사내 메신저 단톡방 잘못 말하기", "PPT 템플릿 다시 만드세요", "오전 9시 정각 미팅 예약",
            "내 코드에 'TO-DO' 2,000개 적발", "파일럿 프로젝트 실패 책임 떠넘기기", "주말에 서버 터져서 강제 복귀",
            "연봉 협상인데 동결 통보", "휴가 중인데 '급한 건'이라며 전화", "인수인계 문서 0바이트",
            "기획서 변경: '원래대로 해주세요'", "보고서에 오타 발견(인쇄 후)", "내 점심 메뉴 부장님이 결정",
            "탕비실 간식 내 앞에서 품절", "엘리베이터 전층 정차", "포맷했는데 백업 안 함",
            "옆팀 팀장님이 나보고 '일 잘하네' (일 시킴)", "회사 폰 지급(24시간 대기)", "내 자리만 와이파이 안 터짐",
            "메일 참조에 사장님 포함됨", "메일 첨부파일 빼먹고 전송", "재발송 메일만 5개째",
            "회사 비품 사비로 결제하기", "출장 가서 상무님과 같은 방", "내 휴가 때 상무님 부친상",
            "부서 이동 통보 (비연고지)", "모니터 하나 고장남", "마우스 클릭 소리 크다고 경고",
            "책상 위 간식 몰래 사라짐", "복사기 종이 걸림 (나 때문 아님)", "도어락 비밀번호 까먹음",
            "회의실 예약 겹쳐서 쫓겨남", "옆 사원 연봉 나보다 높음", "커피 샀는데 한 입 먹고 쏟음",
            "키보드에 라면 국물 튀김", "업데이트 중 강제 종료", "블루스크린 강림",
            "점심 회식인데 메뉴가 보신탕", "인사 고과 C등급", "나만 빼고 단톡방 있음",
            "내 기획안 상사가 자기 이름으로 발표", "사무실에 파리 돌아다님", "의자 삐걱거리는 소리 나만 들림",
            "폰트 저작권 위반 경고장 수신", "도메인 연장 안 해서 사이트 마비", "SSL 인증서 만료",
            "테스트 폰트 '나랏말싸미' 적발", "가족 모임인데 긴급 장애 대응", "회사 밥에서 머리카락 나옴",
            "누가 내 텀블러 씀", "화면 공유 중 카톡 알람 'ㅇㅇ아 놀자'", "팀장님 기분 안 좋음",
            "옆자리 사수 오늘 퇴사", "내일부터 9시 출근 (기존 10시)", "사내 교육 10시간 이수 명령",
            "연말 정산 환급금 0원", "회사 근처에 집 샀는데 사옥 이전", "법카 비밀번호 3회 오류",
            "신규 프로젝트 팀장으로 강제 추대", "유지보수 문서 한글(HWP)로 작성", "구글링 차단된 보안 PC",
            "스택 오버플로우 접속 불가", "사내 보안 메신저가 너무 느림", "퇴근 가방 챙겼는데 팀장님이 부름",
            "내 이름 메일 수신인에서 누락", "복제 폰트 사용 벌금 독촉장", "점심 웨이팅 1시간",
            "에어컨 날개 내 쪽으로 고정", "회사 입구에서 사장님과 마주침", "승진 누락"
        ];

        const winPhrases = [
            "월급 루팡 면허 취득!", "남의 연차 승인권 획득!", "팀장님 카드 무단 사용권!", 
            "전사 메일로 사직서 투척 성공!", "일주일간 '메일 읽씹' 권한 부여!"
        ];

        const nicks = ["문서'반려'동물", "갑질왕", "애는착해요", "법카수호자", "야근요정", "엑셀노가다", "보고서살인마"];

        // 상태 변수
        let p1 = { x: 200, y: 350, hp: 100, face: null, nick: "PLAYER 1", targetX: 200, offset: {x:0, y:0, scale:1} };
        let p2 = { x: 800, y: 350, hp: 100, face: null, nick: "PLAYER 2", targetX: 800, offset: {x:0, y:0, scale:1} };
        let activeP = null;
        let isFighting = false;
        let effects = [];
        let battleMsg = { text: "", x: 0, y: 0, life: 0 };
        let shake = 0;

        // 크롭 관련
        const cropCanvas = document.getElementById('cropCanvas');
        const cctx = cropCanvas.getContext('2d');
        let rawImg = null;
        let cropPos = { x: 150, y: 150 };
        let isDragging = false;

        function openUpload(p) {
            activeP = p === 'p1' ? p1 : p2;
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                rawImg = new Image();
                rawImg.onload = () => {
                    document.getElementById('cropModal').style.display = 'flex';
                    drawCrop();
                };
                rawImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function drawCrop() {
            cctx.clearRect(0, 0, 300, 300);
            const zoom = document.getElementById('zoomRange').value;
            const w = rawImg.width * zoom;
            const h = rawImg.height * zoom;
            cctx.drawImage(rawImg, cropPos.x - w/2, cropPos.y - h/2, w, h);
            
            // 가이드 원
            cctx.strokeStyle = '#facc15';
            cctx.lineWidth = 3;
            cctx.beginPath(); cctx.arc(150, 150, 148, 0, Math.PI*2); cctx.stroke();
        }

        cropCanvas.onmousedown = () => isDragging = true;
        window.onmouseup = () => isDragging = false;
        window.onmousemove = (e) => {
            if(!isDragging) return;
            cropPos.x += e.movementX;
            cropPos.y += e.movementY;
            drawCrop();
        };
        document.getElementById('zoomRange').oninput = drawCrop;

        function saveCrop() {
            const temp = document.createElement('canvas');
            temp.width = 200; temp.height = 200;
            const tCtx = temp.getContext('2d');
            tCtx.beginPath(); tCtx.arc(100, 100, 100, 0, Math.PI*2); tCtx.clip();
            tCtx.drawImage(cropCanvas, 50, 50, 200, 200, 0, 0, 200, 200);
            
            activeP.face = new Image();
            activeP.face.src = temp.toDataURL();
            activeP.nick = nicks[Math.floor(Math.random()*nicks.length)];
            
            const id = activeP === p1 ? 'nick1' : 'nick2';
            document.getElementById(id).innerText = activeP.nick;
            
            document.getElementById('cropModal').style.display = 'none';
            if(p1.face && p2.face) {
                const btn = document.getElementById('fightBtn');
                btn.classList.add('ready');
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function drawChar(p, isP1) {
            const time = Date.now() / 200;
            const idleY = Math.sin(time) * 10;
            const armAngle = Math.sin(time) * 0.3;
            
            p.x += (p.targetX - p.x) * 0.2;

            ctx.save();
            ctx.translate(p.x + 100, p.y + 100 + idleY);
            if(!isP1) ctx.scale(-1, 1);

            // 몸통
            ctx.fillStyle = isP1 ? "#0ea5e9" : "#f43f5e";
            ctx.fillRect(-30, 20, 60, 80);

            // 팔
            ctx.save();
            ctx.translate(-30, 30); ctx.rotate(armAngle);
            ctx.fillRect(-10, 0, 15, 50); ctx.restore();
            ctx.save();
            ctx.translate(30, 30); ctx.rotate(-armAngle);
            ctx.fillRect(-5, 0, 15, 50); ctx.restore();

            // 다리
            ctx.fillRect(-25, 100, 20, 40);
            ctx.fillRect(5, 100, 20, 40);

            // 얼굴
            if(p.face) {
                ctx.save();
                ctx.beginPath(); ctx.arc(0, -60, 70, 0, Math.PI*2); ctx.clip();
                ctx.drawImage(p.face, -70, -130, 140, 140);
                ctx.restore();
            } else {
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, -60, 70, 0, Math.PI*2); ctx.fill();
            }
            
            // 이름
            ctx.scale(isP1?1:-1, 1);
            ctx.fillStyle = "white"; ctx.font = "bold 20px Jua"; ctx.textAlign = "center";
            ctx.fillText(p.nick, 0, 170);

            ctx.restore();
        }

        async function attack(atk, def, isP1) {
            const phrase = attackPhrases[Math.floor(Math.random()*attackPhrases.length)];
            battleMsg = { text: phrase, x: 600, y: 250, life: 90 };
            
            atk.targetX = isP1 ? 100 : 900;
            await new Promise(r => setTimeout(r, 200));
            atk.targetX = isP1 ? def.x - 50 : def.x + 50;
            
            shake = 20;
            def.hp = Math.max(0, def.hp - (10 + Math.random()*15));
            document.getElementById(isP1 ? 'hp2' : 'hp1').style.width = (isP1 ? p2.hp : p1.hp) + "%";
            
            await new Promise(r => setTimeout(r, 500));
            atk.targetX = isP1 ? 200 : 800;
        }

        async function startBattle() {
            isFighting = true;
            while(p1.hp > 0 && p2.hp > 0) {
                await attack(p1, p2, true);
                if(p2.hp <= 0) break;
                await new Promise(r => setTimeout(r, 800));
                await attack(p2, p1, false);
                await new Promise(r => setTimeout(r, 800));
            }
            const winMsg = winPhrases[Math.floor(Math.random()*winPhrases.length)];
            alert(`K.O! 승리자: ${p1.hp>0?p1.nick:p2.nick}\n보상: ${winMsg}`);
            location.reload();
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
            
            // 바닥
            ctx.fillStyle = "#334155"; ctx.fillRect(0, 500, 1200, 200);
            
            drawChar(p1, true);
            drawChar(p2, false);

            if(battleMsg.life > 0) {
                ctx.fillStyle = "#facc15"; ctx.font = "italic bold 40px Jua"; ctx.textAlign = "center";
                ctx.fillText(battleMsg.text, battleMsg.x, battleMsg.y);
                battleMsg.life--;
            }

            ctx.setTransform(1,0,0,1,0,0);
            requestAnimationFrame(loop);
        }
        loop();

        async function recordVoice(p) {
            alert(p + " 기합 녹음 시작 (1.5초)");
            // 기존 녹음 로직 동일...
        }
    </script>
</body>
</html>
