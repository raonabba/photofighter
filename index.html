<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE KING OF IT-COMPLIANCE '26 - Extreme Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background: #020617; color: white; overflow-x: hidden; touch-action: manipulation; }
        .game-container { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; }
        .arena-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16 / 9; 
            border: 5px solid #334155; border-radius: 10px; overflow: hidden;
            background: linear-gradient(to bottom, #070b14 0%, #1e293b 70%, #334155 100%);
        }
        canvas { width: 100%; height: 100%; }
        .hp-system { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; z-index: 10; padding: 0 20px; }
        .hp-outer { width: 42%; height: 26px; background: #450a0a; border: 2px solid #fff; transform: skew(-15deg); overflow: hidden; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .hp-inner { height: 100%; background: linear-gradient(90deg, #facc15, #ef4444); transition: width 0.2s ease-out; }
        .timer { width: 60px; height: 60px; background: #000; border: 3px solid #facc15; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-family: 'Black Han Sans'; color: #facc15; font-size: 1.8rem; box-shadow: 0 0 15px #ca8a04; }
        .control-panel { background: #1e293b; border-radius: 15px; padding: 15px; margin-top: 15px; border-top: 4px solid #eab308; }
        .btn-start { background: linear-gradient(180deg, #facc15 0%, #ca8a04 100%); color: #000; font-family: 'Black Han Sans'; font-size: 1.5rem; opacity: 0.5; pointer-events: none; }
        .btn-start.ready { opacity: 1; pointer-events: auto; cursor: pointer; }
        .stat-badge { font-size: 0.75rem; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; border: 1px solid #475569; }
        .recording { animation: pulse 0.8s infinite; background: #ef4444 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="game-container">
        <div class="flex justify-between items-center mb-3">
            <div class="flex flex-col">
                <h1 class="text-2xl font-bold text-yellow-400 italic leading-none">THE KING OF IT</h1>
                <span class="text-[10px] text-sky-400 tracking-tighter">COMPLIANCE ULTIMATE MATCH 2026</span>
            </div>
            <button id="fightBtn" onclick="startBattle()" class="btn-start px-10 py-2 rounded-lg shadow-2xl transition-all hover:scale-105 active:scale-95">FIGHT!</button>
        </div>

        <div class="arena-wrapper">
            <div class="hp-system">
                <div class="hp-outer"><div id="hp-p1" class="hp-inner" style="width: 100%"></div></div>
                <div class="timer" id="gameTimer">99</div>
                <div class="hp-outer"><div id="hp-p2" class="hp-inner" style="width: 100%"></div></div>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="control-panel grid grid-cols-2 gap-4 shadow-2xl">
            <div class="space-y-2">
                <div class="flex justify-between items-center"><span class="text-sky-400 text-xs font-bold">GOVERNANCE BOSS</span><div id="stats1" class="flex gap-1"></div></div>
                <input id="name1" type="text" value="구매자산팀" class="w-full bg-slate-900 p-2 rounded border border-sky-500 text-sm focus:outline-none">
                <div class="flex gap-1">
                    <button onclick="document.getElementById('file1').click()" class="flex-1 bg-sky-800 hover:bg-sky-700 text-[10px] py-2 rounded font-bold transition">UPLOAD FACE</button>
                    <button id="rec1" onclick="recordVoice('p1')" class="flex-1 bg-slate-700 text-[10px] py-2 rounded font-bold transition">VOICE REC</button>
                </div>
                <input type="file" id="file1" hidden onchange="processImage(event, 'p1')">
            </div>
            <div class="space-y-2 text-right">
                <div class="flex justify-between items-center flex-row-reverse"><span class="text-rose-500 text-xs font-bold">AUDIT KILLER</span><div id="stats2" class="flex gap-1"></div></div>
                <input id="name2" type="text" value="거버넌스팀" class="w-full bg-slate-900 p-2 rounded border border-rose-500 text-sm text-right focus:outline-none">
                <div class="flex gap-1">
                    <button id="rec2" onclick="recordVoice('p2')" class="flex-1 bg-slate-700 text-[10px] py-2 rounded font-bold transition">VOICE REC</button>
                    <button onclick="document.getElementById('file2').click()" class="flex-1 bg-rose-800 hover:bg-rose-700 text-[10px] py-2 rounded font-bold transition">UPLOAD FACE</button>
                </div>
                <input type="file" id="file2" hidden onchange="processImage(event, 'p2')">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 675;

        const attackPhrases = [
            "자산 실사인데 맥북 100대 실종!", "망분리 PC로 유튜브 적발!", "외주가 코드를 깃허브에 올렸다!", 
            "법인카드로 코인 채굴기 구매!", "보고서 폰트 굴림체라고 반려!", "망혼용 케이블 무단 연결!!", 
            "구매 품의서 단가 100배 결제!", "법카한도 초과 보라짱한테 연락받기"
        ];
        const criticalPhrases = [
            "★ 서비스 전체 장애 발생! 전사 비상! ★", "★ 법카한도 초과! 보라짱의 대노! ★", 
            "★ 검찰 조사관 전산실 진입!! ★", "★ 메인 DB 인덱스 없이 전체 조회!! ★",
            "★ 전직원 PC 포맷 명령 하달!! ★"
        ];
        const statNames = ["정치력", "야근력", "뻔뻔함", "메일속도", "회식내성"];

        let p1 = { x: 200, y: 350, hp: 100, face: null, voice: null, stats: {}, targetX: 200 };
        let p2 = { x: 800, y: 350, hp: 100, face: null, voice: null, stats: {}, targetX: 800 };
        let effects = [];
        let shake = 0;
        let isFighting = false;
        let battleMsg = { text: "", x: 0, y: 0, life: 0, isCrit: false, opacity: 0 };

        // 1. 이미지 원형 크롭 및 로드
        function processImage(e, p) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const size = Math.min(img.width, img.height);
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = 200; tempCanvas.height = 200;
                    const tCtx = tempCanvas.getContext('2d');
                    tCtx.beginPath(); tCtx.arc(100, 100, 100, 0, Math.PI * 2); tCtx.clip();
                    tCtx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 200, 200);
                    
                    const croppedImg = new Image();
                    croppedImg.src = tempCanvas.toDataURL();
                    if(p === 'p1') p1.face = croppedImg; else p2.face = croppedImg;
                    generateStats(p);
                    checkReady();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function generateStats(p) {
            const container = document.getElementById(p === 'p1' ? 'stats1' : 'stats2');
            container.innerHTML = '';
            const target = p === 'p1' ? p1 : p2;
            for(let i=0; i<2; i++) {
                const sName = statNames[Math.floor(Math.random()*statNames.length)];
                const sVal = Math.floor(Math.random()*90) + 10;
                target.stats[sName] = sVal;
                container.innerHTML += `<span class="stat-badge text-yellow-400">${sName} ${sVal}</span>`;
            }
        }

        function checkReady() {
            if(p1.face && p2.face) document.getElementById('fightBtn').classList.add('ready');
        }

        async function recordVoice(p) {
            const btn = document.getElementById(p === 'p1' ? 'rec1' : 'rec2');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                btn.classList.add('recording');
                btn.innerText = "Recording...";
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                    const audioURL = window.URL.createObjectURL(blob);
                    if(p === 'p1') p1.voice = new Audio(audioURL);
                    else p2.voice = new Audio(audioURL);
                    btn.classList.remove('recording');
                    btn.innerText = "RECORDED";
                    btn.style.background = "#059669";
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 1500);
            } catch(e) { alert("마이크 권한이 필요합니다."); }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.life = 1; this.color = color;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 10, 10);
                this.x += this.vx; this.y += this.vy; this.life -= 0.05;
                ctx.globalAlpha = 1;
            }
        }

        function drawChar(char, isP1) {
            const bob = Math.sin(Date.now() / 150) * 8;
            // 부드러운 위치 추적 (애니메이션 핵심)
            char.x += (char.targetX - char.x) * 0.2;

            ctx.save();
            ctx.translate(char.x + 100, char.y + 100);
            if(!isP1) ctx.scale(-1, 1);
            
            // 몸체 쉐도우
            ctx.shadowBlur = 20; ctx.shadowColor = isP1 ? "#0ea5e9" : "#e11d48";
            ctx.fillStyle = isP1 ? "#0ea5e9" : "#e11d48";
            ctx.beginPath(); ctx.moveTo(-50, 150); ctx.lineTo(50, 150); ctx.lineTo(40, 0); ctx.lineTo(-40, 0); ctx.fill();

            // 얼굴
            ctx.save();
            if(char.face) {
                ctx.drawImage(char.face, -75, bob - 140, 150, 150);
            } else {
                ctx.fillStyle = "#f1f5f9"; ctx.beginPath(); ctx.arc(0, bob - 65, 75, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
            ctx.strokeStyle = "white"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(0, bob - 65, 77, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }

        async function attack(atk, def, isP1) {
            const isCrit = Math.random() < 0.25;
            const msg = isCrit ? criticalPhrases[Math.floor(Math.random()*criticalPhrases.length)] : attackPhrases[Math.floor(Math.random()*attackPhrases.length)];
            
            battleMsg = { text: msg, x: 600, y: 250, life: 80, isCrit: isCrit, opacity: 0 };
            if(atk.voice) atk.voice.play();

            // 1. 기 모으기 (살짝 뒤로)
            atk.targetX = isP1 ? 100 : 900;
            await new Promise(r => setTimeout(r, 200));

            // 2. 초고속 돌진
            atk.targetX = isP1 ? def.x - 50 : def.x + 50;
            await new Promise(r => setTimeout(r, 100));

            // 3. 타격 및 효과
            let damage = Math.floor(Math.random()*15) + (isCrit ? 20 : 10);
            def.hp = Math.max(0, def.hp - damage);
            document.getElementById(`hp-${isP1?'p2':'p1'}`).style.width = (isP1?p2.hp:p1.hp) + "%";
            
            shake = isCrit ? 50 : 20;
            for(let i=0; i<15; i++) effects.push(new Particle(def.x + 100, def.y + 50, isCrit ? '#ff4444' : '#ffffff'));

            await new Promise(r => setTimeout(r, isCrit ? 1000 : 600));
            atk.targetX = isP1 ? 200 : 800; // 복귀
        }

        async function startBattle() {
            if(isFighting) return;
            isFighting = true;
            p1.hp = 100; p2.hp = 100;
            document.querySelectorAll('.hp-inner').forEach(h => h.style.width = "100%");

            while(p1.hp > 0 && p2.hp > 0) {
                await attack(p1, p2, true);
                if(p2.hp <= 0) break;
                await new Promise(r => setTimeout(r, 600));
                await attack(p2, p1, false);
                await new Promise(r => setTimeout(r, 600));
            }
            
            const winner = p1.hp > 0 ? document.getElementById('name1').value : document.getElementById('name2').value;
            alert(`K.O! [${winner}] 가 IT 컴플라이언스의 왕으로 등극했습니다!`);
            isFighting = false;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(shake > 0) { ctx.save(); ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.85; }

            // 바닥 및 배경 장식
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 500, canvas.width, 175);
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 500); ctx.lineTo(i, 675); ctx.stroke(); }

            drawChar(p1, true);
            drawChar(p2, false);

            effects = effects.filter(e => e.life > 0);
            effects.forEach(e => e.draw());

            if(battleMsg.life > 0) {
                battleMsg.opacity = Math.min(1, battleMsg.life / 20);
                ctx.globalAlpha = battleMsg.opacity;
                ctx.fillStyle = battleMsg.isCrit ? "#ff4444" : "#facc15";
                ctx.font = `italic bold ${battleMsg.isCrit ? '45px' : '35px'} Jua`;
                ctx.textAlign = "center";
                ctx.shadowBlur = 10; ctx.shadowColor = "black";
                ctx.fillText(battleMsg.text, battleMsg.x, battleMsg.y);
                ctx.globalAlpha = 1;
                battleMsg.life--;
            }
            
            if(shake > 0) ctx.restore();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
