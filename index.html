<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE KING OF IT 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        :root { --p1: #0ea5e9; --p2: #f43f5e; --panel: #1e293b; }
        body { 
            font-family: 'Jua', sans-serif; background: #020617; color: white; 
            margin: 0; padding: 0; overflow: hidden; height: 100dvh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 메인 프레임: 화면 전체 비율 유지 */
        .game-wrapper {
            width: 95%; max-width: 1000px; height: 100%;
            display: flex; flex-direction: column;
            padding: 20px 0; box-sizing: border-box;
        }

        /* 아레나 박스 (16:9 비율 유지하며 절대 안 잘림) */
        .arena-outer {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            background: #334155; border: 8px solid #475569; border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }
        
        canvas { width: 100%; height: 100%; display: block; }

        /* 체력바 레이아웃 */
        .ui-overlay {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 10px; padding: 0 5%; pointer-events: none;
        }
        .hp-bar { flex: 1; height: 25px; background: #450a0a; border: 2px solid #fff; transform: skew(-15deg); overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #ef4444); transition: width 0.3s; }
        .fight-btn-top {
            background: linear-gradient(180deg, #fbbf24, #d97706);
            padding: 5px 20px; border-radius: 8px; border: 2px solid #fff;
            font-family: 'Black Han Sans'; font-size: 1.5rem; color: #450a0a;
            cursor: pointer; pointer-events: auto;
        }

        /* 하단 컨트롤 패널 */
        .control-panel {
            margin-top: 15px; background: var(--panel); border: 3px solid #475569;
            border-radius: 12px; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .p-info { display: flex; flex-direction: column; gap: 8px; }
        .neon-btn {
            width: 100%; padding: 10px; border-radius: 8px; font-weight: bold;
            border: 2px solid transparent; transition: 0.2s; cursor: pointer; font-size: 0.9rem;
        }
        .btn-p1 { border-color: var(--p1); color: var(--p1); box-shadow: inset 0 0 8px var(--p1); }
        .btn-p2 { border-color: var(--p2); color: var(--p2); box-shadow: inset 0 0 8px var(--p2); }

        /* 스태츠 뱃지 */
        .stat-badge { background: rgba(0,0,0,0.4); border: 1px solid #fbbf24; color: #fbbf24; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; }

        /* 크롭 모달 */
        #cropModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #cropCanvas { border: 2px solid #fbbf24; border-radius: 50%; touch-action: none; background: #222; }
    </style>
</head>
<body>

    <div id="cropModal">
        <canvas id="cropCanvas" width="300" height="300"></canvas>
        <input type="range" id="zoomRange" min="0.1" max="3" step="0.05" value="1" class="w-64 my-6">
        <button onclick="saveCrop()" class="bg-yellow-500 text-black px-10 py-3 rounded-xl font-bold">얼굴 저장</button>
    </div>

    <div class="game-wrapper">
        <div class="text-center mb-2">
            <h1 class="text-2xl md:text-3xl font-black text-yellow-400 italic">THE KING OF IT '26</h1>
        </div>

        <div class="arena-outer">
            <div class="ui-overlay">
                <div class="hp-bar"><div id="hp1" class="hp-fill" style="width:100%"></div></div>
                <div class="fight-btn-top" onclick="startBattle()">FIGHT!</div>
                <div class="hp-bar"><div id="hp2" class="hp-fill" style="width:100%"></div></div>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="control-panel">
            <div class="p-info">
                <div class="flex justify-between items-center">
                    <span id="name1" class="text-sky-400 font-bold">Player 1</span>
                    <div id="s1" class="flex gap-1"></div>
                </div>
                <button onclick="openUpload('p1')" class="neon-btn btn-p1">UPLOAD FACE</button>
            </div>
            <div class="p-info">
                <div class="flex justify-between items-center flex-row-reverse">
                    <span id="name2" class="text-rose-500 font-bold">Player 2</span>
                    <div id="s2" class="flex gap-1"></div>
                </div>
                <button onclick="openUpload('p2')" class="neon-btn btn-p2">UPLOAD FACE</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*">

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 675;

        const phrases = ["운영DB 삭제!", "품의서 반려!", "법카 한도초과!", "주말 장애발생!", "슬랙 닉네임 실수!", "배포 1분전 기획변경!", "맥북에 커피!", "퇴근직전 회의!"];
        const nicks = ["문서반려동물", "법카수호자", "야근요정", "보고서살인마", "코드먹튀꾼", "거버넌스보스", "감사킬러"];
        const statsPool = ["야근력", "정치력", "정신력", "커피심부름력", "엑셀노가다력"];

        let p1 = { x: 300, y: 380, hp: 100, face: null, name: "P1", stats: [] };
        let p2 = { x: 900, y: 380, hp: 100, face: null, name: "P2", stats: [] };
        let activeP = null, isFighting = false, shake = 0, msg = { text: "", life: 0 };

        // 사진 조절
        const cCanvas = document.getElementById('cropCanvas'), cctx = cCanvas.getContext('2d');
        let rawImg = null, cropPos = { x: 150, y: 150 }, isDragging = false, lastX, lastY;

        function openUpload(p) { activeP = (p === 'p1' ? p1 : p2); document.getElementById('fileInput').click(); }

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                rawImg = new Image();
                rawImg.onload = () => { document.getElementById('cropModal').style.display = 'flex'; drawCrop(); };
                rawImg.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function drawCrop() {
            cctx.clearRect(0, 0, 300, 300);
            const z = document.getElementById('zoomRange').value;
            cctx.drawImage(rawImg, cropPos.x - (rawImg.width*z)/2, cropPos.y - (rawImg.height*z)/2, rawImg.width*z, rawImg.height*z);
            cctx.strokeStyle = '#fbbf24'; cctx.lineWidth = 4; cctx.beginPath(); cctx.arc(150, 150, 145, 0, Math.PI*2); cctx.stroke();
        }

        cCanvas.onmousedown = (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
        window.onmousemove = (e) => { if(isDragging) { cropPos.x += (e.clientX-lastX); cropPos.y += (e.clientY-lastY); lastX=e.clientX; lastY=e.clientY; drawCrop(); }};
        window.onmouseup = () => isDragging = false;

        function saveCrop() {
            const temp = document.createElement('canvas'); temp.width = 200; temp.height = 200;
            const tCtx = temp.getContext('2d');
            tCtx.beginPath(); tCtx.arc(100, 100, 100, 0, Math.PI*2); tCtx.clip();
            tCtx.drawImage(cCanvas, 50, 50, 200, 200, 0, 0, 200, 200);
            activeP.face = new Image(); activeP.face.src = temp.toDataURL();
            
            // 사진 저장 시 이름/능력치 랜덤 생성
            activeP.name = nicks[Math.floor(Math.random()*nicks.length)];
            activeP.stats = [
                `${statsPool[Math.floor(Math.random()*statsPool.length)]} ${Math.floor(Math.random()*99)}`,
                `${statsPool[Math.floor(Math.random()*statsPool.length)]} ${Math.floor(Math.random()*99)}`
            ];
            updateUI();
            document.getElementById('cropModal').style.display = 'none';
        }

        function updateUI() {
            document.getElementById('name1').innerText = p1.name;
            document.getElementById('name2').innerText = p2.name;
            document.getElementById('s1').innerHTML = p1.stats.map(s => `<span class="stat-badge">${s}</span>`).join('');
            document.getElementById('s2').innerHTML = p2.stats.map(s => `<span class="stat-badge">${s}</span>`).join('');
        }

        function drawChar(p, isP1) {
            const bob = Math.sin(Date.now() / 150) * 8;
            ctx.save();
            ctx.translate(p.x, p.y + bob);
            if(!isP1) ctx.scale(-1, 1);

            // 몸통 포즈
            ctx.shadowBlur = 15; ctx.shadowColor = isP1 ? "#0ea5e9" : "#f43f5e";
            ctx.strokeStyle = isP1 ? "#0ea5e9" : "#f43f5e"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(-35, 20); ctx.lineTo(35, 20); ctx.lineTo(25, 100); ctx.lineTo(-25, 100); ctx.closePath();
            ctx.fillStyle = "#1e293b"; ctx.fill(); ctx.stroke();
            
            // 팔/다리
            ctx.beginPath(); ctx.moveTo(-35, 30); ctx.lineTo(-60, 60); ctx.lineTo(-40, 80); // 팔
            ctx.moveTo(-20, 100); ctx.lineTo(-40, 150); ctx.lineTo(-70, 150); // 다리
            ctx.moveTo(20, 100); ctx.lineTo(40, 150); ctx.lineTo(70, 150); // 다리
            ctx.stroke();

            // 얼굴
            if(p.face) {
                ctx.save(); ctx.beginPath(); ctx.arc(0, -60, 70, 0, Math.PI*2); ctx.clip();
                ctx.drawImage(p.face, -70, -130, 140, 140); ctx.restore();
                ctx.stroke();
            } else {
                ctx.fillStyle = "#334155"; ctx.beginPath(); ctx.arc(0, -60, 70, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
            ctx.restore();
        }

        async function startBattle() {
            if(isFighting || !p1.face || !p2.face) return;
            isFighting = true;
            while(p1.hp > 0 && p2.hp > 0) {
                await doAtk(p1, p2, true); if(p2.hp <= 0) break;
                await new Promise(r => setTimeout(r, 600));
                await doAtk(p2, p1, false);
                await new Promise(r => setTimeout(r, 600));
            }
            alert(`게임 종료! 승리: ${p1.hp>0?p1.name:p2.name}`);
            location.reload();
        }

        async function doAtk(a, d, isP1) {
            msg = { text: phrases[Math.floor(Math.random()*phrases.length)], life: 70 };
            const startX = a.x; a.x = isP1 ? d.x - 100 : d.x + 100; shake = 20;
            d.hp = Math.max(0, d.hp - 20);
            document.getElementById(isP1?'hp2':'hp1').style.width = (isP1?p2.hp:p1.hp) + "%";
            await new Promise(r => setTimeout(r, 300));
            a.x = startX;
        }

        function loop() {
            ctx.clearRect(0, 0, 1200, 675);
            if(shake > 0) { ctx.save(); ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.8; }
            
            // 바닥 격자
            ctx.strokeStyle = "rgba(14, 165, 233, 0.2)"; ctx.lineWidth = 1;
            for(let i=0; i<12; i++) { ctx.beginPath(); ctx.moveTo(0, 480+i*20); ctx.lineTo(1200, 480+i*20); ctx.stroke(); }
            
            drawChar(p1, true); drawChar(p2, false);
            if(msg.life > 0) {
                ctx.fillStyle = "#fbbf24"; ctx.font = "bold 40px Jua"; ctx.textAlign = "center";
                ctx.fillText(battleMsg = msg.text, 600, 250); msg.life--;
            }
            if(shake > 0) ctx.restore();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
