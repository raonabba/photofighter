<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT 금융 실무 파이터 - 굴욕의 배포판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background: #0f172a; color: white; touch-action: manipulation; padding: 10px; }
        .arena-wrapper { position: relative; width: 100%; max-width: 850px; aspect-ratio: 16 / 9; margin: 0 auto; border: 4px solid #38bdf8; border-radius: 20px; overflow: hidden; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        canvas { width: 100%; height: 100%; display: block; }
        .hp-bar-bg { height: 14px; background: #334155; border-radius: 7px; overflow: hidden; border: 2px solid #1e293b; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .input-group input { background: rgba(15, 23, 42, 0.8); border: 2px solid #38bdf8; color: white; border-radius: 10px; padding: 8px; width: 100%; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="w-full max-w-2xl mb-4 text-center">
        <h1 class="text-3xl font-bold text-sky-400 mb-4 italic">⚡ IT FINANCE FIGHTER ⚡</h1>
        <div class="grid grid-cols-2 gap-6 input-group">
            <div>
                <label class="text-sm text-sky-300 block mb-1">PLAYER 1 (이름)</label>
                <input id="p1-name" type="text" value="테크구매팀" oninput="syncNames()">
            </div>
            <div>
                <label class="text-sm text-pink-400 block mb-1">PLAYER 2 (이름)</label>
                <input id="p2-name" type="text" value="감사법무팀" oninput="syncNames()">
            </div>
        </div>
    </div>

    <div class="arena-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="w-full max-w-2xl mt-4 grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-800/80 p-5 rounded-2xl border border-slate-700">
        <div class="space-y-3">
            <div class="flex justify-between items-end"><span id="lbl-p1-name" class="text-xl text-sky-400">PLAYER 1</span><span class="text-xs text-slate-400">HP</span></div>
            <div class="hp-bar-bg"><div id="hp-p1-fill" class="hp-bar-fill" style="width: 100%"></div></div>
            <button onclick="document.getElementById('up-p1').click()" class="w-full bg-slate-700 text-xs py-2 rounded-lg border border-slate-600 hover:bg-slate-600 transition">P1 얼굴 변경</button>
        </div>
        
        <div class="flex flex-col justify-center gap-3">
            <button onclick="startBattle()" id="btn-start" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-xl shadow-[0_0_15px_rgba(37,99,235,0.5)] active:scale-95 transition-all">⚔️ 서비스 배포!</button>
            <input type="file" id="up-p1" hidden accept="image/*" onchange="loadFile(event, 'p1')">
            <input type="file" id="up-p2" hidden accept="image/*" onchange="loadFile(event, 'p2')">
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-end"><span id="lbl-p2-name" class="text-xl text-pink-400">PLAYER 2</span><span class="text-xs text-slate-400">HP</span></div>
            <div class="hp-bar-bg"><div id="hp-p2-fill" class="hp-bar-fill" style="width: 100%"></div></div>
            <button onclick="document.getElementById('up-p2').click()" class="w-full bg-slate-700 text-xs py-2 rounded-lg border border-slate-600 hover:bg-slate-600 transition">P2 얼굴 변경</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 공격 멘트 50종 (IT 금융 실무용)
        const attackPhrases = ["금감원 수검 대응 자료 1,000장 준비!", "운영 서버 root 권한 즉시 회수!!", "보안성 심의 '조건부 승인'!", "망분리 PC 인터넷 즉시 차단!", "IT 구매 품의 '반려' 처리!", "클라우드 비용 300% 폭증!", "자산 실사 누락분 500개 발견!", "긴급 장애 전파: 결제 마비!", "SW 라이선스 오남용 적발!", "정보보호 상시평가 미이행!", "외주 인력 노트북 포맷 확인!", "IT 예산 전액 삭감!", "데이터 유실 발생: 복구 불가!", "코드 리뷰: 전면 재작성!", "금요일 5시 긴급 배포 승인!", "내부망 VPN 권한 만료!", "개인정보 노출 사고 오탐!", "계약서 법무 검토: 전면 수정!", "입찰 담합 소명 자료 제출!", "서버 패치 실패: 롤백 불가!", "방화벽 정책 5,000건 삭제!", "자산 관리 태그 1만개 부착!", "기술지원 계약 SLA 미준수!", "BCP 훈련: 센터 강제 전환!", "비인가 SW 탐지: 시말서!", "유지보수 대금 정산 누락!", "신규 솔루션 보안성 거절!", "데이터 센터 출입 기록 조작!", "사용자 권한 오남용 감사!", "망 연계 서버 트래픽 초과!", "백업 데이터 복구 실패!", "차세대 오픈 무기한 연기!", "하드웨어 내용연수 강제 연장!", "정보보안 공시 자료 오기입!", "감사 지적 사항 100건 미이행!", "법인카드 정산 반려!", "IT 기획안 '전략 부재' 회신!", "SSL 인증서 만료 차단!", "시스템 취약점 '상'급 50건!", "외주 업체 보안 위반 벌점!", "DB 쿼리 성능 저하 전체 락!", "보안 에이전트 점유율 99%!", "실소유자 확인 프로세스 누락!", "이상 금융거래 시스템 마비!", "연간 운영계획 백지화!", "최종 결재권자 장기 휴가!", "망분리 우회 시도 적발!!", "장애 보고서 5단 콤보 작성!"];

        // 패배자 굴욕 멘트 20종
        const humiliationPhrases = [
            "실무 능력이 주니어보다 못하시네요.", "장애 보고서나 쓰러 가시죠, 폰트 10으로.", "인사 고과는 이미 'D'로 확정되었습니다.", "현업 부서가 당신 이름만 들어도 고개를 젓네요.", "당신이 만든 시스템, 오늘부로 전량 폐기입니다.", "망분리 PC 없는 창고 자리가 당신의 새 사무실입니다.", "법인카드는커녕 탕비실 믹스커피도 금지입니다.", "보안성 심의 통과 확률 0%에 수렴하시네요.", "외주 업체 사장님도 당신보다는 일 잘할듯.", "당신의 기획안은 이면지로도 아깝습니다.", "로그 기록 보니까 일 안 하고 딴짓만 하셨던데?", "클라우드 비용 낭비 주범으로 명예의 전당 등극!", "시말서 100장 써오세요. 수기로.", "당신 자산 관리 번호는 '000001'(폐기 예정)입니다.", "계약서 오타 하나로 회사에 10억 손해 입히셨네요.", "IT 보안 교육 24시간 연속 수강 대상자입니다.", "오늘부터 당신의 모든 배포 승인은 영구 반려입니다.", "책상 빼세요. 자산 실사 결과 당신 자리는 없습니다.", "기술 지원 업체가 당신 전화는 블랙리스트에 넣었답니다.", "당신의 실무 경력은 오늘부로 '로그 삭제' 되었습니다."
        ];

        let p1 = { x: 120, hp: 100, face: null, name: "테크구매팀" };
        let p2 = { x: 550, hp: 100, face: null, name: "감사법무팀" };
        let battleText = { content: "", opacity: 0, x: 0, y: 0 };
        let isRunning = false;

        function resize() { canvas.width = 800; canvas.height = 450; }
        window.addEventListener('resize', resize);
        resize();

        function syncNames() {
            p1.name = document.getElementById('p1-name').value || "PLAYER 1";
            p2.name = document.getElementById('p2-name').value || "PLAYER 2";
            document.getElementById('lbl-p1-name').innerText = p1.name;
            document.getElementById('lbl-o-name')?.remove(); // 중복 방지
            document.getElementById('lbl-p2-name').innerText = p2.name;
        }

        function loadFile(event, type) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => { if(type === 'p1') p1.face = img; else p2.face = img; };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function drawCharacter(char, isP1) {
            const centerX = char.x + 75;
            const centerY = 280;
            ctx.save();
            if (!isP1) { ctx.translate(centerX * 2, 0); ctx.scale(-1, 1); }
            ctx.fillStyle = "#334155";
            ctx.beginPath();
            ctx.moveTo(centerX - 40, centerY + 80);
            ctx.quadraticCurveTo(centerX, centerY + 50, centerX + 40, centerY + 80);
            ctx.lineTo(centerX + 50, centerY + 150);
            ctx.lineTo(centerX - 50, centerY + 150);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            if (char.face) ctx.drawImage(char.face, centerX - 50, centerY - 50, 100, 100);
            else { ctx.fillStyle = "#cbd5e1"; ctx.fillRect(centerX-50, centerY-50, 100, 100); }
            ctx.restore();
            ctx.strokeStyle = isP1 ? "#38bdf8" : "#f43f5e";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(centerX, centerY, 52, 0, Math.PI * 2); ctx.stroke();
        }

        async function startBattle() {
            if (isRunning) return;
            isRunning = true;
            p1.hp = 100; p2.hp = 100;
            updateUI();
            while (p1.hp > 0 && p2.hp > 0) {
                await attack(p1, p2, true);
                if (p2.hp <= 0) break;
                await new Promise(r => setTimeout(r, 800));
                await attack(p2, p1, false);
                await new Promise(r => setTimeout(r, 800));
            }
            const winner = p1.hp > 0 ? p1.name : p2.name;
            const loser = p1.hp > 0 ? p2.name : p1.name;
            const insult = humiliationPhrases[Math.floor(Math.random() * humiliationPhrases.length)];
            alert(`🏆 승리: ${winner}\n💀 패배자(${loser})에게 한마디:\n"${insult}"`);
            isRunning = false;
        }

        async function attack(attacker, target, isP1) {
            battleText.content = attackPhrases[Math.floor(Math.random() * attackPhrases.length)];
            battleText.x = attacker.x + 75; battleText.y = 180; battleText.opacity = 1;
            const originalX = attacker.x;
            const targetX = isP1 ? target.x - 100 : target.x + 100;
            for(let i=0; i<12; i++) { attacker.x += (targetX - attacker.x) * 0.4; await new Promise(r => setTimeout(r, 20)); }
            target.hp -= Math.floor(Math.random() * 25) + 10;
            if(target.hp < 0) target.hp = 0;
            updateUI();
            await new Promise(r => setTimeout(r, 1200));
            for(let i=0; i<15; i++) { attacker.x += (originalX - attacker.x) * 0.3; battleText.opacity -= 0.07; await new Promise(r => setTimeout(r, 25)); }
            attacker.x = originalX; battleText.opacity = 0;
        }

        function updateUI() {
            document.getElementById('hp-p1-fill').style.width = p1.hp + "%";
            document.getElementById('hp-p2-fill').style.width = p2.hp + "%";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCharacter(p1, true);
            drawCharacter(p2, false);
            if (battleText.opacity > 0) {
                ctx.save();
                ctx.globalAlpha = battleText.opacity;
                ctx.font = "bold 24px Jua";
                ctx.textAlign = "center";
                const tw = ctx.measureText(battleText.content).width;
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.beginPath();
                ctx.roundRect(battleText.x - (tw/2) - 15, battleText.y - 30, tw + 30, 45, 10);
                ctx.fill();
                ctx.fillStyle = "#ffff00";
                ctx.fillText(battleText.content, battleText.x, battleText.y);
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
