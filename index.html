<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포토 파이터 - 액션 업그레이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(180deg, #0a001f, #2a0033);
            color: white;
            overflow: hidden;
        }
        .arena {
            position: relative;
            width: 100%;
            max-width: 960px;
            height: 480px;
            margin: 20px auto;
            background: #0f0a1f;
            border: 10px solid #00ffff;
            border-radius: 25px;
            box-shadow: 0 0 60px #ff00aa, inset 0 0 80px rgba(0,255,255,0.2);
            overflow: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8">
    <h1 class="text-6xl tracking-widest text-[#00ffff] mb-2 drop-shadow-[0_0_30px_#00ffff]">📸 포토 파이터</h1>
    <p class="text-[#ff00aa] text-2xl mb-8">액션 강화 버전</p>

    <div class="arena">
        <canvas id="gameCanvas" width="960" height="480"></canvas>
    </div>

    <div class="flex gap-6 text-center">
        <div>
            <button onclick="startBattle()" 
                    class="px-12 py-6 bg-gradient-to-r from-red-600 to-pink-600 text-4xl font-bold rounded-3xl hover:scale-110 transition-all shadow-xl">
                ⚔️ 전투 시작
            </button>
        </div>
        <div>
            <button onclick="resetBattle()" 
                    class="px-10 py-6 bg-white/10 hover:bg-white/20 text-2xl rounded-3xl border border-white/40">
                🔄 새로 시작
            </button>
        </div>
    </div>

    <div class="mt-8 text-sm text-gray-400 max-w-lg text-center">
        사진 업로드는 아직 간단히 유지했지만, 원하면 더 세밀하게 추가 가능!<br>
        지금은 데모용 기본 이미지 사용 중
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 180, hp: 280, maxHp: 280, name: "YOU", img: null };
        let opponent = { x: 680, hp: 300, maxHp: 300, name: "RIVAL", img: null };
        
        let particles = [];
        let attacksInProgress = [];
        let shake = 0;
        let battleRunning = false;
        
        // 기본 이미지 (실제 사진 업로드로 교체 가능)
        function loadDefaultImages() {
            const pImg = new Image();
            pImg.src = "https://picsum.photos/id/1015/400/500";
            player.img = pImg;
            
            const oImg = new Image();
            oImg.src = "https://picsum.photos/id/201/400/500";
            opponent.img = oImg;
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 18;
                this.vy = (Math.random() - 0.5) * 18 - 3;
                this.life = 45 + Math.random() * 30;
                this.color = color;
                this.size = 6 + Math.random() * 9;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.35; // 중력
                this.life--;
                this.size *= 0.97;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 50;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }
        
        function createExplosion(x, y, intensity = 1) {
            for (let i = 0; i < 45 * intensity; i++) {
                const colors = ['#ffaa00', '#ff4400', '#ffff00', '#ff0088'];
                particles.push(new Particle(x, y, colors[Math.floor(Math.random()*colors.length)]));
            }
            shake = 12;
        }
        
        function drawFighter(fighter, isPlayer) {
            if (!fighter.img) return;
            
            const scale = 1.1;
            const w = 220 * scale;
            const h = 320 * scale;
            
            ctx.save();
            if (!isPlayer) ctx.scale(-1, 1);
            
            const drawX = isPlayer ? fighter.x : -fighter.x - w;
            
            ctx.drawImage(fighter.img, drawX, 120, w, h);
            
            // HP 바
            const barY = 80;
            const barWidth = 240;
            ctx.fillStyle = '#111';
            ctx.fillRect(fighter.x - 20, barY, barWidth, 22);
            ctx.fillStyle = fighter.hp > fighter.maxHp * 0.3 ? '#00ff88' : '#ff4444';
            ctx.fillRect(fighter.x - 20, barY, (fighter.hp / fighter.maxHp) * barWidth, 22);
            
            ctx.restore();
        }
        
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 배경 간단 그라데이션
            const grad = ctx.createLinearGradient(0, 0, 0, 480);
            grad.addColorStop(0, '#1a0033');
            grad.addColorStop(1, '#0a001f');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 파이터 그리기
            drawFighter(player, true);
            drawFighter(opponent, false);
            
            // 파티클 업데이트 & 그리기
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // 화면 흔들림
            if (shake > 0) {
                ctx.save();
                ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2);
                shake *= 0.85;
                if (shake < 0.5) shake = 0;
                ctx.restore();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        async function performAttack(attacker, defender, attackName) {
            attacksInProgress.push(attackName);
            
            const isPlayerAttack = attacker === player;
            const startX = attacker.x;
            const targetX = isPlayerAttack ? defender.x - 120 : defender.x + 120;
            
            // 공격 모션: 앞으로 돌진
            for (let i = 0; i < 8; i++) {
                attacker.x += (targetX - attacker.x) * 0.25;
                await new Promise(r => setTimeout(r, 16));
            }
            
            // 히트!
            const damage = 22 + Math.random() * 38;
            defender.hp = Math.max(0, defender.hp - damage);
            
            createExplosion(isPlayerAttack ? defender.x + 80 : defender.x - 80, 240, 1.6);
            
            // 강한 흔들림
            shake = 22;
            
            // 후퇴
            for (let i = 0; i < 6; i++) {
                attacker.x += (startX - attacker.x) * 0.3;
                await new Promise(r => setTimeout(r, 20));
            }
            
            attacksInProgress.pop();
        }
        
        async function startBattle() {
            if (battleRunning) return;
            battleRunning = true;
            
            player.hp = player.maxHp = 280;
            opponent.hp = opponent.maxHp = 300;
            
            let turn = 0;
            const maxTurns = 16 + Math.floor(Math.random() * 6); // 16~21턴
            
            while (player.hp > 0 && opponent.hp > 0 && turn < maxTurns) {
                turn++;
                
                // 플레이어 공격
                if (player.hp > 0) {
                    const attacks = ["강력 펀치", "회전 발차기", "에너지 빔", "박치기 돌진", "필살기"];
                    const attackName = attacks[Math.floor(Math.random() * attacks.length)];
                    await performAttack(player, opponent, attackName);
                    await new Promise(r => setTimeout(r, 400));
                }
                
                // 상대 공격
                if (opponent.hp > 0) {
                    const attacks = ["강력 펀치", "회전 발차기", "에너지 빔", "박치기 돌진"];
                    const attackName = attacks[Math.floor(Math.random() * attacks.length)];
                    await performAttack(opponent, player, attackName);
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            
            battleRunning = false;
            
            if (player.hp > opponent.hp) {
                alert("🎉 YOU WIN!! 멋진 승리입니다!");
            } else {
                alert("💥 YOU LOSE... 다음에 더 강해지자!");
            }
        }
        
        function resetBattle() {
            location.reload();
        }
        
        // 시작
        window.onload = () => {
            loadDefaultImages();
            gameLoop();
            console.log("%c✅ 액션 강화 버전 로드 완료! 펀치·킥·빔 모두 실시간 파티클 + 모션 적용됨", "color:#00ffff; font-size:18px");
        };
    </script>
</body>
</html>
